# Project N.O.M.A.D. - Unraid Docker Compose
#
# Usage:
#   1. Copy to /boot/config/plugins/compose.manager/projects/project-nomad/docker-compose.yml
#   2. Replace all 'replaceme' values (see instructions below)
#   3. Start via Docker Compose Manager UI or: docker compose up -d
#
# Before starting, generate secrets:
#   APP_KEY=$(openssl rand -hex 16) && DB_PASS=$(openssl rand -hex 16)
#   echo "APP_KEY=$APP_KEY  DB_PASS=$DB_PASS"
#
# Replace:
#   - APP_KEY=replaceme       -> your generated APP_KEY
#   - DB_PASSWORD=replaceme   -> your generated DB_PASS
#   - MYSQL_ROOT_PASSWORD=replaceme -> your generated DB_PASS
#   - MYSQL_PASSWORD=replaceme -> your generated DB_PASS (must match DB_PASSWORD)
#   - URL=replaceme           -> http://<YOUR_UNRAID_IP>:8080
#
# External Ollama:
#   If you have an existing Ollama container running on your Unraid server,
#   you can connect to it from the N.O.M.A.D. UI at Settings > Models > Connection.
#   Enter: http://host.docker.internal:11434 (if Ollama runs on the Unraid host)
#
# Tailscale:
#   Install the Tailscale Unraid plugin from Community Applications.
#   Access N.O.M.A.D. remotely at http://<TAILSCALE_IP>:8080
#   No compose changes needed for Tailscale support.
#
# Updating:
#   docker compose pull && docker compose up -d

name: project-nomad
services:
  admin:
    image: ghcr.io/crosstalk-solutions/project-nomad:latest
    pull_policy: always
    container_name: nomad_admin
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    volumes:
      - /mnt/user/appdata/project-nomad/storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
      - PORT=8080
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - APP_KEY=replaceme
      - URL=replaceme
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=nomad
      - DB_USER=nomad_user
      - DB_PASSWORD=replaceme
      - DB_NAME=nomad
      - DB_SSL=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NOMAD_STORAGE_PATH=/mnt/user/appdata/project-nomad/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mysql:
    image: mysql:8.0
    container_name: nomad_mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=replaceme
      - MYSQL_DATABASE=nomad
      - MYSQL_USER=nomad_user
      - MYSQL_PASSWORD=replaceme
    volumes:
      - /mnt/user/appdata/project-nomad/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: nomad_redis
    restart: unless-stopped
    volumes:
      - /mnt/user/appdata/project-nomad/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  dozzle:
    image: amir20/dozzle:v10.0
    container_name: nomad_dozzle
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_ENABLE_ACTIONS=false
      - DOZZLE_ENABLE_SHELL=false

  disk-collector:
    image: ghcr.io/crosstalk-solutions/project-nomad-disk-collector:latest
    pull_policy: always
    container_name: nomad_disk_collector
    restart: unless-stopped
    volumes:
      - /:/host:ro
      - /mnt/user/appdata/project-nomad/storage:/storage
