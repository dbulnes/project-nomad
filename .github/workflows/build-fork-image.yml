name: Build Fork Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. latest, dev, 1.2.3)'
        required: false
        default: 'latest'
        type: string

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/dbulnes/project-nomad:${{ inputs.tag }}
          build-args: |
            VERSION=${{ inputs.tag }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
